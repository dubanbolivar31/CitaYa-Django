{% extends 'base.html' %}
{% block title %}Editar Historial · CitaYa{% endblock %}
{% block content %}

<div class="page-header">
    <h1 class="page-title"><i class="fa-solid fa-edit"></i> Editar Historial #{{ object.id_historial }}</h1>
    <a href="{% url 'ver_historiales' %}" class="btn btn-secondary">← Volver</a>
</div>

<div class="form-card">
    <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-grid">

            <div class="form-group">
                <label>Médico Tratante</label>
                <select name="{{ form.id_medico.html_name }}">
                    {% for m in form.id_medico.field.queryset %}
                    <option value="{{ m.pk }}" {% if form.id_medico.value|stringformat:"s" == m.pk|stringformat:"s" %}selected{% endif %}>
                        Dr. {{ m.nombre }} {{ m.apellido }}
                    </option>
                    {% endfor %}
                </select>
                {{ form.id_medico.errors }}
            </div>

            <div class="form-group full">
                <label>Paciente</label>
                <select name="{{ form.id_paciente.html_name }}">
                    {% for p in form.id_paciente.field.queryset %}
                    <option value="{{ p.pk }}" {% if form.id_paciente.value|stringformat:"s" == p.pk|stringformat:"s" %}selected{% endif %}>
                        {{ p.nombre }} {{ p.apellido }}
                    </option>
                    {% endfor %}
                </select>
                {{ form.id_paciente.errors }}
            </div>

            <div class="form-group full">
                <label>Antecedentes</label>
                <textarea name="{{ form.antecedentes.html_name }}" rows="5">{{ form.antecedentes.value|default:'' }}</textarea>
                {{ form.antecedentes.errors }}
            </div>

        </div>
        <div class="form-actions" style="margin-top: 24px; display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save"></i> Actualizar Historial</button>
            <a href="{% url 'ver_historiales' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
