{% extends 'base.html' %}
{% block title %}Nuevo Historial · CitaYa{% endblock %}
{% block content %}

<div class="page-header">
    <h1 class="page-title">📝 Nuevo Historial Clínico</h1>
    <a href="{% url 'ver_historiales' %}" class="btn btn-secondary">← Volver</a>
</div>

<div class="form-card">
    <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-grid">
            
            <div class="form-group">
                <label>Fecha del Registro</label>
                <input type="date" name="{{ form.fecha.html_name }}" value="{{ form.fecha.value|default:'' }}">
                {{ form.fecha.errors }}
            </div>
            
            <div class="form-group">
                <label>Médico Tratante</label>
                <select name="{{ form.id_medico.html_name }}">
                    <option value="">— Seleccionar médico —</option>
                    {% for m in form.id_medico.field.queryset %}
                    <option value="{{ m.pk }}" {% if form.id_medico.value|stringformat:"s" == m.pk|stringformat:"s" %}selected{% endif %}>
                        Dr. {{ m.nombre }} {{ m.apellido }}
                    </option>
                    {% endfor %}
                </select>
                {{ form.id_medico.errors }}
            </div>
            
            <div class="form-group full">
                <label>Paciente</label>
                <select name="{{ form.id_paciente.html_name }}">
                    <option value="">— Seleccionar paciente —</option>
                    {% for p in form.id_paciente.field.queryset %}
                    <option value="{{ p.pk }}" {% if form.id_paciente.value|stringformat:"s" == p.pk|stringformat:"s" %}selected{% endif %}>
                        {{ p.nombre }} {{ p.apellido }} ({{ p.numero_doc }})
                    </option>
                    {% endfor %}
                </select>
                {{ form.id_paciente.errors }}
            </div>
            
            <div class="form-group full">
                <label>Antecedentes y Notas Médicas</label>
                <textarea name="{{ form.antecedentes.html_name }}" rows="5" placeholder="Escriba aquí los antecedentes, diagnósticos o notas..."></textarea>
                {{ form.antecedentes.errors }}
            </div>
            
        </div>
        <div class="form-actions" style="margin-top: 24px; display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save"></i> Guardar Historial</button>
            <a href="{% url 'ver_historiales' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
