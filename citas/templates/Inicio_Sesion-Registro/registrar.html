{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cita Ya - Registro</title>

    <link rel="icon" href="{% static 'assets/img/logoti.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'assets/css/registro.css' %}">
</head>

<body>

<div class="card">

    <!-- HEADER -->
    <div class="card-header">
        <div class="header-img-wrap">
            <img src="{% static 'assets/img/registrarnut.png' %}" width="70">
        </div>

        <div class="brand">Cita <span>Ya</span></div>
        <div class="step-label" id="stepLabel">Paso 1 de 3</div>

        <div class="progress-wrap">
            <div class="step-dot active" id="dot1"><div class="dot-circle">1</div></div>
            <div class="step-dot" id="dot2"><div class="dot-circle">2</div></div>
            <div class="step-dot" id="dot3"><div class="dot-circle">3</div></div>
        </div>
    </div>

    <!-- 🔥 FORM REAL -->
    <form method="POST" action="{% url 'registro' %}">
        {% csrf_token %}

        <div class="card-body">

            <!-- ERRORES DJANGO -->
            {% if form.errors or messages %}
            <div class="error-box" style="display:block;">
                {% for message in messages %}<p>{{ message }}</p>{% endfor %}
                {% if form.errors %}<p>Corrige los errores</p>{% endif %}
            </div>
            {% endif %}

            <!-- STEP 1 -->
            <div class="step-panel active" id="panel1">
                <div class="fields two-col">

                    <select name="tipo_doc" id="tipo_doc" required>
                        <option value="">Tipo documento</option>
                        <option value="CC">CC</option>
                        <option value="TI">TI</option>
                        <option value="CE">CE</option>
                        <option value="PP">Pasaporte</option>
                    </select>

                    <input type="text" name="numero_doc" id="numero_doc" placeholder="Documento" required>

                    <input type="text" name="nombre" id="nombre" placeholder="Nombre" required>

                    <input type="text" name="apellido" id="apellido" placeholder="Apellido" required>

                    <select name="genero" id="genero" required>
                        <option value="">Género</option>
                        <option value="M">M</option>
                        <option value="F">F</option>
                    </select>

                    <input type="date" name="fecha_nacimiento" id="fechaNacimiento" required>
                </div>
            </div>

            <!-- STEP 2 -->
            <div class="step-panel" id="panel2">
                <div class="fields two-col">

                    <select name="tipo_sangre" id="tipo_sangre" required>
                        <option value="">Tipo sangre</option>
                        <option value="A+">A+</option>
                        <option value="O+">O+</option>
                    </select>

                    <input type="tel" name="telefono" id="telefono" placeholder="Teléfono" required>

                    <input type="email" name="correo" id="correo" placeholder="Correo" required>

                    <input type="text" name="direccion" id="direccion" placeholder="Dirección" required>
                </div>
            </div>

            <!-- STEP 3 -->
            <div class="step-panel" id="panel3">
                <div class="fields">
                    <input type="password" name="contrasena" id="contrasena" placeholder="Contraseña" required>
                    <input type="password" name="confirmar_contrasena" id="confirmarContrasena" placeholder="Confirmar" required>
                </div>
            </div>

        </div>

        <!-- FOOTER -->
        <div class="card-footer">
            <button type="button" onclick="goBack()">←</button>
            <button type="button" onclick="goNext()">→</button>
            <button type="submit" id="btnSubmit" style="display:none;">Registrar</button>
        </div>

    </form>

</div>

<script>
let step = 1;

function goNext() {
    if (!validar(step)) return;

    document.getElementById('panel' + step).classList.remove('active');
    step++;
    document.getElementById('panel' + step).classList.add('active');

    if (step === 3) {
        document.getElementById('btnSubmit').style.display = 'inline';
    }
}

function goBack() {
    if (step === 1) return;

    document.getElementById('panel' + step).classList.remove('active');
    step--;
    document.getElementById('panel' + step).classList.add('active');

    document.getElementById('btnSubmit').style.display = 'none';
}

function validar(s) {
    if (s === 1) {
        let doc = document.getElementById('numero_doc').value;
        if (doc.length < 5) {
            alert("Documento inválido");
            return false;
        }
    }

    if (s === 2) {
        let tel = document.getElementById('telefono').value;
        if (tel.length !== 10) {
            alert("Teléfono inválido");
            return false;
        }
    }

    if (s === 3) {
        let p1 = document.getElementById('contrasena').value;
        let p2 = document.getElementById('confirmarContrasena').value;

        if (p1 !== p2) {
            alert("Contraseñas no coinciden");
            return false;
        }
    }

    return true;
}
</script>

</body>
</html>
