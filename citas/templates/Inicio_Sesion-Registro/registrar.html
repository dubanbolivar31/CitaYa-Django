{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cita Ya — Registro</title>
    <link rel="icon" type="image" href="{% static 'assets/img/logoti.png' %}">

    <!-- Tipografías -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:ital,wght@0,600;1,300&display=swap" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="{% static 'assets/css/registro.css' %}">
</head>

<body>

    <div class="card">

        <!-- ── ENCABEZADO ── -->
        <header class="card-header">

            <!-- Logo circular -->
            <div class="header-img-wrap">
                <img src="{% static 'assets/img/registrarnut.png' %}" alt="Logo Cita Ya">
            </div>

            <!-- Nombre de la app -->
            <p class="step-label">Crear cuenta</p>



        </header>

        <!-- ── CUERPO ── -->
        <main class="card-body">

            <!-- Mensajes de error del servidor -->
            {% if messages %}
            <div class="server-error-box" role="alert">
                {% for message in messages %}
                    <p class="{{ message.tags }}">{{ message }}</p>
                {% endfor %}
            </div>
            {% endif %}

            <!-- Formulario de registro -->
            <form id="registro-form" method="POST" action="{% url 'registro' %}" novalidate>
                {% csrf_token %}

                <div class="fields two-col">

                    <!-- Tipo de documento -->
                    <div class="field">
                        <label for="tipo_doc">Tipo de documento</label>
                        <select id="tipo_doc" name="tipo_doc" required>
                            <option value="">Seleccione…</option>
                            <option value="CC" {% if post.tipo_doc == 'CC' %}selected{% endif %}>CC</option>
                            <option value="TI" {% if post.tipo_doc == 'TI' %}selected{% endif %}>TI</option>
                            <option value="CE" {% if post.tipo_doc == 'CE' %}selected{% endif %}>CE</option>
                            <option value="PP" {% if post.tipo_doc == 'PP' %}selected{% endif %}>Pasaporte</option>
                        </select>
                    </div>

                    <!-- Número de documento -->
<div class="field">
    <label for="numero_doc">Número de documento</label>
    <input
        type="text"
        id="numero_doc"
        name="numero_doc"
        placeholder="Ej: 1023456789"
        value="{{ post.numero_doc|default:'' }}"
        required>
</div>

<!--VALIDACION DE DOCUMENTO SCRIP-->
<script>
// seleccionamos elementos
const tipoDoc = document.getElementById("tipo_doc");
const numeroDoc = document.getElementById("numero_doc");
const error = document.getElementById("error");

// cuando cambia el tipo
tipoDoc.addEventListener("change", () => {
    numeroDoc.value = "";
    error.textContent = "";

    if (tipoDoc.value === "cc") {
        numeroDoc.maxLength = 10;
        numeroDoc.placeholder = "6 a 10 números";
    }

    else if (tipoDoc.value === "ti") {
        numeroDoc.maxLength = 10;
        numeroDoc.placeholder = "10 números exactos";
    }

    else if (tipoDoc.value === "ce") {
        numeroDoc.maxLength = 12;
        numeroDoc.placeholder = "6 a 12 números";
    }

    else if (tipoDoc.value === "pasaporte") {
        numeroDoc.maxLength = 15;
        numeroDoc.placeholder = "Alfanumérico";
    }
});

// validar mientras escribe 🔥
numeroDoc.addEventListener("input", () => {
    const tipo = tipoDoc.value;
    const valor = numeroDoc.value;

    error.textContent = ""; // limpiar error

    if (!tipo) {
        error.textContent = "Primero selecciona el tipo de documento";
        return;
    }

    if (tipo === "cc") {
        if (!/^[0-9]*$/.test(valor)) {
            error.textContent = "Solo números";
        } else if (valor.length < 6) {
            error.textContent = "Mínimo 6 dígitos";
        }
    }

    else if (tipo === "ti") {
        if (!/^[0-9]*$/.test(valor)) {
            error.textContent = "Solo números";
        } else if (valor.length !== 10) {
            error.textContent = "Debe tener 10 dígitos";
        }
    }

    else if (tipo === "ce") {
        if (!/^[0-9]*$/.test(valor)) {
            error.textContent = "Solo números";
        } else if (valor.length < 6) {
            error.textContent = "Mínimo 6 dígitos";
        }
    }

    else if (tipo === "pasaporte") {
        if (!/^[a-zA-Z0-9]*$/.test(valor)) {
            error.textContent = "Solo letras y números";
        }
    }
});
</script>
<!--VALIDACION DE DOCUMENTO SCRIP-->


                    <!-- Nombre -->
                    <div class="field">
                        <label for="nombre">Nombre</label>
                        <input
                            type="text"
                            id="nombre"
                            name="nombre"
                            value="{{ post.nombre|default:'' }}"
                            placeholder="Juan Carlos"
                            maxlength="50"
                            required>
                    </div>

                    <!-- Apellido -->
                    <div class="field">
                        <label for="apellido">Apellido</label>
                        <input
                            type="text"
                            id="apellido"
                            name="apellido"
                            value="{{ post.apellido|default:'' }}"
                            placeholder="Pérez González"
                            maxlength="50"
                            required>
                    </div>

                    <!-- Género -->
                    <div class="field">
                        <label for="genero">Género</label>
                        <select id="genero" name="genero" required>
                            <option value="">Seleccione…</option>
                            <option value="M" {% if post.genero == 'M' %}selected{% endif %}>Masculino</option>
                            <option value="F" {% if post.genero == 'F' %}selected{% endif %}>Femenino</option>
                            <option value="Otro" {% if post.genero == 'Otro' %}selected{% endif %}>Otro</option>
                        </select>
                    </div>

                    <!-- Fecha de nacimiento -->
                    <div class="field">
                        <label for="fechaNacimiento">Fecha de nacimiento</label>
                        <input
                            type="date"
                            id="fechaNacimiento"
                            name="fecha_nacimiento"
                            value="{{ post.fecha_nacimiento|default:'' }}"
                            required>
                    </div>

                    <!-- Tipo de sangre -->
                    <div class="field">
                        <label for="tipo_sangre">Tipo de sangre</label>
                        <select id="tipo_sangre" name="tipo_sangre" required>
                            <option value="">Seleccione…</option>
                            <option value="A+"  {% if post.tipo_sangre == 'A+' %}selected{% endif %}>A+</option>
                            <option value="A-"  {% if post.tipo_sangre == 'A-' %}selected{% endif %}>A-</option>
                            <option value="B+"  {% if post.tipo_sangre == 'B+' %}selected{% endif %}>B+</option>
                            <option value="B-"  {% if post.tipo_sangre == 'B-' %}selected{% endif %}>B-</option>
                            <option value="AB+" {% if post.tipo_sangre == 'AB+' %}selected{% endif %}>AB+</option>
                            <option value="AB-" {% if post.tipo_sangre == 'AB-' %}selected{% endif %}>AB-</option>
                            <option value="O+"  {% if post.tipo_sangre == 'O+' %}selected{% endif %}>O+</option>
                            <option value="O-"  {% if post.tipo_sangre == 'O-' %}selected{% endif %}>O-</option>
                        </select>
                    </div>

                    <!-- Teléfono -->
                    <div class="field">
                        <label for="telefono">Teléfono</label>
                        <input
                            type="tel"
                            id="telefono"
                            name="telefono"
                            value="{{ post.telefono|default:'' }}"
                            placeholder="Ej: 3124567890"
                            inputmode="numeric"
                            required>
                    </div>

                    <!-- Correo electrónico -->
                    <div class="field full">
                        <label for="correo">Correo electrónico</label>
                        <input
                            type="email"
                            id="correo"
                            name="correo"
                            value="{{ post.correo|default:'' }}"
                            placeholder="correo@ejemplo.com"
                            maxlength="100"
                            required>
                    </div>

                    <!-- Dirección -->
                    <div class="field full">
                        <label for="direccion">Dirección</label>
                        <input
                            type="text"
                            id="direccion"
                            name="direccion"
                            value="{{ post.direccion|default:'' }}"
                            placeholder="Calle 123 #45-67"
                            maxlength="100"
                            required>
                    </div>

                    <!-- Contraseña -->
                    <div class="field full">
                        <label for="contrasena">Contraseña</label>
                        <div class="input-eye-wrap">
                            <input
                                type="password"
                                id="contrasena"
                                name="contrasena"
                                placeholder="Mínimo 8 caracteres"
                                minlength="8"
                                autocomplete="new-password"
                                required>
                            <button type="button" class="eye-btn" data-target="contrasena" aria-label="Mostrar contraseña" tabindex="-1">
                                <svg class="eye-icon eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="eye-icon eye-closed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            </button>
                        </div>
                        <!-- Indicadores de requisitos -->
                        <ul class="pass-rules" id="pass-rules">
                            <li class="rule" id="rule-len">   <span class="rule-dot"></span> Mínimo 8 caracteres</li>
                            <li class="rule" id="rule-upper"> <span class="rule-dot"></span> Al menos 1 mayúscula</li>
                            <li class="rule" id="rule-special"><span class="rule-dot"></span> Al menos 1 carácter especial (!@#$%^&*)</li>
                        </ul>
                    </div>

                    <!-- Confirmar contraseña -->
                    <div class="field full">
                        <label for="confirmarContrasena">Confirmar contraseña</label>
                        <div class="input-eye-wrap">
                            <input
                                type="password"
                                id="confirmarContrasena"
                                name="confirmar_contrasena"
                                placeholder="Repite tu contraseña"
                                minlength="8"
                                autocomplete="new-password"
                                required>
                            <button type="button" class="eye-btn" data-target="confirmarContrasena" aria-label="Mostrar contraseña" tabindex="-1">
                                <svg class="eye-icon eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="eye-icon eye-closed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            </button>
                        </div>
                        <span class="match-hint" id="match-hint"></span>
                    </div>

                </div><!-- /.fields -->

            </form><!-- /#registro-form -->

        </main>

        <!-- ── PIE ── -->
        <footer class="card-footer">
            <button type="submit" form="registro-form" class="btn btn-submit">
                Registrarse ›
            </button>
        </footer>

        <!-- Enlace a login -->
        <p class="login-link">
            ¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión</a>
        </p>

    </div><!-- /.card -->


    <!-- ── SCRIPTS DE VALIDACIÓN ── -->
    <script>
        /* ── FECHA DE NACIMIENTO ── */
        (function () {
            const f   = document.getElementById('fechaNacimiento');
            const hoy = new Date();
            const max = new Date(hoy); max.setMonth(max.getMonth() - 1);
            const min = new Date(hoy); min.setFullYear(min.getFullYear() - 90);
            f.max = max.toISOString().split('T')[0];
            f.min = min.toISOString().split('T')[0];
        })();

        /* ── HELPERS ── */
        function markValid(el) {
            el.classList.remove('field-error');
            el.classList.add('field-ok');
        }
        function markError(el) {
            el.classList.remove('field-ok');
            el.classList.add('field-error');
        }
        function clearMark(el) {
            el.classList.remove('field-ok', 'field-error');
        }

        /* ── NÚMERO DE DOCUMENTO ── */
document.getElementById('numero_doc').addEventListener('input', function () {
    const v = this.value.replace(/\D/g, '').slice(0, 10);
    this.value = v;

    if (v.length === 0) {
        clearMark(this);
        this.setCustomValidity('');
        return;
    }

    if (v.length < 6) {
        this.setCustomValidity('Mínimo 6 dígitos');
        markError(this);
    } else {
        this.setCustomValidity('');
        markValid(this);
    }
});

        /* ── NOMBRE ── */
        document.getElementById('nombre').addEventListener('input', function () {
            this.value = this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g, '');
            const s = this.value.replace(/\s/g, '');
            if (s.length === 0) { clearMark(this); this.setCustomValidity(''); return; }
            if (s.length < 3) { this.setCustomValidity('Mínimo 3 caracteres'); markError(this); }
            else              { this.setCustomValidity(''); markValid(this); }
        });

        /* ── APELLIDO ── */
        document.getElementById('apellido').addEventListener('input', function () {
            this.value = this.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g, '');
            const s = this.value.replace(/\s/g, '');
            if (s.length === 0) { clearMark(this); this.setCustomValidity(''); return; }
            if (s.length < 3) { this.setCustomValidity('Mínimo 3 caracteres'); markError(this); }
            else              { this.setCustomValidity(''); markValid(this); }
        });

        /* ── TELÉFONO ── */
        document.getElementById('telefono').addEventListener('input', function () {
            const v = this.value.replace(/\D/g, '').slice(0, 10);
            this.value = v;
            if (v.length === 0) { clearMark(this); this.setCustomValidity(''); return; }
            if (v[0] !== '3') { this.setCustomValidity('Debe empezar con 3'); markError(this); }
            else if (v.length < 10) { this.setCustomValidity('Exactamente 10 dígitos'); markError(this); }
            else { this.setCustomValidity(''); markValid(this); }
        });

        /* ── CORREO ── */
        document.getElementById('correo').addEventListener('input', function () {
            const at    = this.value.indexOf('@');
            const local = at > 0 ? this.value.slice(0, at) : '';
            if (this.value.length === 0) { clearMark(this); this.setCustomValidity(''); return; }
            if (at <= 0 || local.length < 5) {
                this.setCustomValidity('Mínimo 5 caracteres antes del @'); markError(this);
            } else {
                this.setCustomValidity(''); markValid(this);
            }
        });

        /* ── OJO (mostrar/ocultar contraseña) ── */
        document.querySelectorAll('.eye-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                const input  = document.getElementById(this.dataset.target);
                const isPass = input.type === 'password';
                input.type   = isPass ? 'text' : 'password';
                this.querySelector('.eye-open').style.display  = isPass ? 'none'  : '';
                this.querySelector('.eye-closed').style.display = isPass ? ''     : 'none';
                this.setAttribute('aria-label', isPass ? 'Ocultar contraseña' : 'Mostrar contraseña');
            });
        });

        /* ── REQUISITOS DE CONTRASEÑA ── */
        const passInput = document.getElementById('contrasena');
        const ruleLen     = document.getElementById('rule-len');
        const ruleUpper   = document.getElementById('rule-upper');
        const ruleSpecial = document.getElementById('rule-special');
        const rulesBox    = document.getElementById('pass-rules');

        function checkRule(li, ok) {
            li.classList.toggle('rule-ok', ok);
            li.classList.toggle('rule-fail', !ok);
        }

        passInput.addEventListener('focus', () => rulesBox.classList.add('visible'));

        passInput.addEventListener('input', function () {
            const v = this.value;
            const lenOk     = v.length >= 8;
            const upperOk   = /[A-Z]/.test(v);
            const specialOk = /[!@#$%^&*]/.test(v);

            checkRule(ruleLen, lenOk);
            checkRule(ruleUpper, upperOk);
            checkRule(ruleSpecial, specialOk);

            if (lenOk && upperOk && specialOk) {
                this.setCustomValidity(''); markValid(this);
            } else if (v.length > 0) {
                this.setCustomValidity('La contraseña no cumple los requisitos'); markError(this);
            } else {
                this.setCustomValidity(''); clearMark(this);
            }

            // actualizar coincidencia en tiempo real
            checkMatch();
        });

        /* ── COINCIDENCIA DE CONTRASEÑAS ── */
        const confirmInput = document.getElementById('confirmarContrasena');
        const matchHint    = document.getElementById('match-hint');

        function checkMatch() {
            const pass    = passInput.value;
            const confirm = confirmInput.value;
            if (confirm.length === 0) {
                matchHint.textContent = '';
                matchHint.className   = 'match-hint';
                clearMark(confirmInput);
                confirmInput.setCustomValidity('');
                return;
            }
            if (pass === confirm) {
                matchHint.textContent = '✓ Las contraseñas coinciden';
                matchHint.className   = 'match-hint match-ok';
                confirmInput.setCustomValidity(''); markValid(confirmInput);
            } else {
                matchHint.textContent = '✗ No coinciden';
                matchHint.className   = 'match-hint match-err';
                confirmInput.setCustomValidity('No coinciden'); markError(confirmInput);
            }
        }

        confirmInput.addEventListener('input', checkMatch);

        /* ── VALIDACIÓN AL ENVIAR ── */
        document.getElementById('registro-form').addEventListener('submit', function (e) {
            const pass    = passInput.value;
            const confirm = confirmInput.value;

            if (pass !== confirm) {
                e.preventDefault();
                confirmInput.focus();
                checkMatch();
                return;
            }

            const nombre   = document.getElementById('nombre').value.replace(/\s/g, '');
            const apellido = document.getElementById('apellido').value.replace(/\s/g, '');
            if (nombre.length < 3 || apellido.length < 3) {
                e.preventDefault();
                return;
            }
        });
    </script>




</body>
</html>
